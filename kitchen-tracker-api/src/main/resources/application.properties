spring.application.name=kitchen-tracker-api
server.port=${PORT:8080}

# H2 database — keep data between restarts (file-based instead of pure in-memory)
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/kitchen}
spring.datasource.driverClassName=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# Auto-create tables based on @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Enable H2 console at /h2-console
spring.h2.console.enabled=true

# Suppress that "open-in-view" warning
spring.jpa.open-in-view=false

# Comma-separated frontend origins allowed to call the API.
app.cors.allowed-origins=${FRONTEND_ORIGINS:http://localhost:5173}

# Gemini recipe suggestions. Keep the real key in your shell/environment.
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# Optional token for external cron services that wake the app and run push alerts.
notification.cron-token=${NOTIFICATION_CRON_TOKEN:}
